name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Engine
        run: >
          xcodebuild -project LipikaIME.xcodeproj -target Engine
          -configuration Debug CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=10.13 build

      - name: Build InputSource
        run: >
          xcodebuild -project LipikaIME.xcodeproj -target InputSource
          -configuration Debug CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=10.13 build

      - name: Build Installer
        run: >
          xcodebuild -project LipikaIME.xcodeproj -target Installer
          -configuration Debug CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=10.13 build

      - name: Package installer (unsigned)
        run: |
          xcodebuild -project LipikaIME.xcodeproj -target InputSource \
            -configuration Release CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=10.13 build
          xcodebuild -project LipikaIME.xcodeproj -target Installer \
            -configuration Release CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=10.13 build
          cp -r build/Release/LipikaIME.app Installer/LipikaIME.app
          cp build/Release/installer Installer/Scripts/installer
          cd Installer
          pkgbuild --component LipikaIME.app --scripts ./Scripts \
            --install-location "/Library/Input Methods" \
            com.daivajnanam.inputmethod.LipikaIME.pkg
          productbuild --distribution ./Distribution --package-path ./ \
            --resources ./Resources LipikaIME.pkg

      - name: Upload installer package
        uses: actions/upload-artifact@v4
        with:
          name: LipikaIME-installer
          path: Installer/LipikaIME.pkg
