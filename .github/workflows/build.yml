name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Engine
        run: >
          xcodebuild -project LipikaIME.xcodeproj -target Engine
          -configuration Debug CODE_SIGNING_ALLOWED=NO build

      - name: Build InputSource
        run: >
          xcodebuild -project LipikaIME.xcodeproj -target InputSource
          -configuration Debug CODE_SIGNING_ALLOWED=NO build

      - name: Build Installer
        run: >
          xcodebuild -project LipikaIME.xcodeproj -target Installer
          -configuration Debug CODE_SIGNING_ALLOWED=NO build
